<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Studio Planner V2.1 - Technical Layout Tool</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Browser-based studio floor planning tool for lighting, camera, green screen, measurements, and technical labels.">
<style>
:root{--bg:#0f172a;--panel:#111827;--panel2:#1f2937;--line:#334155;--text:#e5e7eb;--muted:#94a3b8;--floor:#f8fafc;--grid:#cbd5e1}
*{box-sizing:border-box}html,body{margin:0;height:100%;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:var(--text)}
button,input,select,textarea{font:inherit}
.app{display:grid;grid-template-columns:320px 1fr 340px;height:100vh;gap:1px;background:var(--line)}
.panel{background:var(--panel);overflow:auto;padding:16px}.center{background:#0b1220;display:flex;flex-direction:column;min-width:0}
.section{border:1px solid var(--line);background:rgba(255,255,255,.03);border-radius:14px;padding:14px;margin-bottom:14px}
h2,h3{margin:0 0 12px}.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.field{margin-bottom:10px}
label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px}
input,select,textarea{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--line);background:var(--panel2);color:var(--text);outline:none}
textarea{min-height:80px;resize:vertical}
button{border:1px solid var(--line);background:var(--panel2);color:var(--text);padding:10px 12px;border-radius:10px;cursor:pointer}
button:hover{filter:brightness(1.08)}.accent{background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.45)}.sky{background:rgba(56,189,248,.15);border-color:rgba(56,189,248,.45)}.warn{background:rgba(245,158,11,.15);border-color:rgba(245,158,11,.45)}.danger{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.45)}.purple{background:rgba(167,139,250,.15);border-color:rgba(167,139,250,.45)}
.toolbar{display:flex;flex-wrap:wrap;gap:8px;padding:12px;border-bottom:1px solid var(--line);background:var(--panel)}.spacer{flex:1}
.wrap{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;padding:16px;overflow:auto}
.stage{position:relative;width:min(100%,1300px);aspect-ratio:16/10;border-radius:20px;background:#0f172a;border:1px solid var(--line);overflow:hidden}
.floor{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:var(--floor);border:2px dashed #94a3b8;box-shadow:0 8px 30px rgba(0,0,0,.35)}
.floor.grid{background-image:linear-gradient(to right,var(--grid) 1px,transparent 1px),linear-gradient(to bottom,var(--grid) 1px,transparent 1px)}
.floor-label{position:absolute;left:12px;top:12px;padding:6px 10px;border-radius:999px;background:rgba(15,23,42,.85);color:#fff;font-size:12px;z-index:8}
.obj{position:absolute;user-select:none;transform-origin:center;cursor:grab}.obj.selected .core{box-shadow:0 0 0 4px rgba(56,189,248,.28)}
.core{width:100%;height:100%;display:flex;align-items:center;justify-content:center;border:2px solid #0f172a;color:#0f172a;font-size:12px;font-weight:bold}
.light .core{background:#fde68a;border-radius:50%}.softbox .core{background:#fdba74;border-radius:12px}.practical .core{background:#fca5a5;border-radius:12px}.camera .core{background:#93c5fd;border-radius:12px}.subject .core{background:#86efac;border-radius:50%}.monitor .core{background:#c4b5fd;border-radius:10px}.wall .core{background:#cbd5e1;border-radius:6px}.greenscreen .core{background:#4ade80;border-radius:8px}
.name-label{position:absolute;left:50%;top:calc(100% + 6px);transform:translateX(-50%);white-space:nowrap;font-size:11px;padding:4px 8px;background:rgba(15,23,42,.88);color:white;border-radius:999px;pointer-events:none}
.meta-label{position:absolute;left:50%;top:calc(100% + 28px);transform:translateX(-50%);white-space:nowrap;font-size:10px;line-height:1.25;padding:5px 8px;background:rgba(2,6,23,.86);color:#e2e8f0;border:1px solid rgba(148,163,184,.35);border-radius:8px;pointer-events:none;text-align:center;min-width:90px}
.beam{position:absolute;left:50%;top:50%;transform:translate(-50%,-8px);pointer-events:none}.beam svg{overflow:visible;display:block}
.camdir,.subdir{position:absolute;left:50%;top:50%;height:2px;transform:translate(0,-50%);pointer-events:none}.camdir{width:70px;background:#0ea5e9}.subdir{width:45px;background:#22c55e}
.measure-line{position:absolute;height:2px;background:#a855f7;transform-origin:left center;pointer-events:none;z-index:1}.measure-label{position:absolute;padding:4px 8px;font-size:11px;background:#581c87;color:white;border-radius:999px;transform:translate(-50%,-50%);pointer-events:none;z-index:2}
.list{display:flex;flex-direction:column;gap:8px;max-height:240px;overflow:auto}.item{width:100%;text-align:left;padding:10px;border-radius:12px;background:rgba(255,255,255,.03)}.item.active{border-color:#38bdf8;background:rgba(56,189,248,.08)}
.mini{font-size:12px;color:var(--muted);margin-top:6px}.stack{display:flex;gap:8px;flex-wrap:wrap}.badge{display:inline-block;padding:4px 8px;border-radius:999px;font-size:11px;background:rgba(255,255,255,.06);color:var(--muted)}
@media(max-width:1200px){.app{grid-template-columns:1fr;height:auto}.center{min-height:72vh}}
</style>
</head>
<body>
<div class="app">
<aside class="panel">
<h2>Studio Setup</h2>
<div class="section">
<div class="field"><label>Layout Name</label><input id="layoutName" value="Studio Planner V2.1 Layout"></div>
<div class="row"><div class="field"><label>Floor Width (m)</label><input id="floorWidth" type="number" min="1" step="0.1" value="12"></div><div class="field"><label>Floor Height (m)</label><input id="floorHeight" type="number" min="1" step="0.1" value="8"></div></div>
<div class="row"><div class="field"><label>Grid Size (m)</label><input id="gridSize" type="number" min="0.1" step="0.1" value="1"></div><div class="field"><label>Snap</label><select id="snapToggle"><option value="on" selected>On</option><option value="off">Off</option></select></div></div>
<div class="field"><label>Studio Notes</label><textarea id="layoutNotes" placeholder="Camera line, presenter area, cable path, greenscreen notes..."></textarea></div>
</div>
<div class="section"><h3>Fixture Presets</h3><div class="row"><button class="accent" onclick="addPreset('aputure300d')">Aputure 300d</button><button class="accent" onclick="addPreset('arriS60')">Skypanel S60</button><button class="accent" onclick="addPreset('nanlite300')">Nanlite Forza</button><button class="warn" onclick="addPreset('tube')">Practical Tube</button></div></div>
<div class="section"><h3>Add Components</h3><div class="row"><button class="accent" onclick="addObject('light')">Add Light</button><button class="accent" onclick="addObject('softbox')">Add Softbox</button><button onclick="addObject('practical')">Add Practical</button><button class="sky" onclick="addObject('camera')">Add Camera</button><button onclick="addObject('subject')">Add Subject</button><button onclick="addObject('monitor')">Add Monitor</button><button class="warn" onclick="addObject('wall')">Add Wall / Flat</button><button class="accent" onclick="addObject('greenscreen')">Add Green Screen</button></div></div>
<div class="section"><h3>Measure</h3><div class="stack"><button class="purple" id="measureBtn" onclick="toggleMeasure()">Measure: Off</button><span class="badge" id="measureStatus">Click two objects</span></div></div>
<div class="section"><h3>Objects</h3><div id="objectList" class="list"></div></div>
</aside>

<main class="center">
<div class="toolbar"><button onclick="toggleGrid()">Toggle Grid</button><button onclick="duplicateSelected()">Duplicate</button><button class="danger" onclick="deleteSelected()">Delete</button><button onclick="centerSelected()">Center</button><button class="danger" onclick="clearMeasurements()">Clear Measurements</button><div class="spacer"></div><button onclick="saveLayout()">Save JSON</button><button onclick="document.getElementById('loadFile').click()">Load JSON</button><button class="sky" onclick="exportPNG()">Export PNG</button><button class="sky" onclick="exportPDF()">Export PDF</button><input id="loadFile" type="file" accept="application/json" style="display:none"></div>
<div class="wrap"><div class="stage" id="stage"><div class="floor grid" id="floor"><div class="floor-label" id="floorLabel">Studio Planner V2.1 Layout</div></div></div></div>
</main>

<aside class="panel">
<h2>Component Details</h2>
<div id="detailEmpty" class="section">Select an item on the floor to edit it.</div>
<div id="detailPanel" style="display:none">
<div class="section">
<div class="field"><label>Name</label><input id="dName"></div>
<div class="field"><label>Type</label><input id="dType" disabled></div>
<div class="field"><label>Preset</label><input id="dPreset" disabled></div>
<div class="row"><div class="field"><label>X (m)</label><input id="dX" type="number" step="0.1"></div><div class="field"><label>Y (m)</label><input id="dY" type="number" step="0.1"></div></div>
<div class="row"><div class="field"><label>Width (m)</label><input id="dW" type="number" step="0.1"></div><div class="field"><label>Height (m)</label><input id="dH" type="number" step="0.1"></div></div>
<div class="field"><label>Rotation (°)</label><input id="dRot" type="range" min="0" max="360"><div class="mini"><span id="dRotV">0</span>°</div></div>
<div class="field" id="beamBox"><label>Beam Spread (°)</label><input id="dBeam" type="range" min="10" max="140"><div class="mini"><span id="dBeamV">45</span>°</div></div>
<div class="field" id="intensityBox"><label>Intensity (%)</label><input id="dIntensity" type="range" min="0" max="100"><div class="mini"><span id="dIntensityV">100</span>%</div></div>
<div class="field" id="kelvinBox"><label>Kelvin</label><input id="dKelvin" type="number" step="100" min="1000" max="20000"></div>
<div class="field" id="lensBox"><label>Lens (mm)</label><input id="dLens" type="number" step="1" min="1"></div>
<div class="field" id="apertureBox"><label>Aperture</label><input id="dAperture" placeholder="f/2.8"></div>
<div class="field" id="wbBox"><label>White Balance (K)</label><input id="dWB" type="number" step="100" min="1000" max="20000"></div>
<div class="field"><label>Color / Notes Label</label><input id="dColor"></div>
<div class="field"><label>Notes</label><textarea id="dNotes"></textarea></div>
</div></div>
</aside>
</div>

<script>
const presets={
aputure300d:{name:'Aputure 300d',type:'light',w:.8,h:.8,intensity:85,kelvin:5600,color:'5600K',beamAngle:35},
arriS60:{name:'ARRI Skypanel S60',type:'softbox',w:1.3,h:.35,intensity:70,kelvin:5600,color:'5600K',beamAngle:90},
nanlite300:{name:'Nanlite Forza 300',type:'light',w:.8,h:.8,intensity:80,kelvin:5600,color:'5600K',beamAngle:40},
tube:{name:'Practical Tube',type:'practical',w:1.2,h:.18,intensity:55,kelvin:3200,color:'3200K',beamAngle:120}
};
const defaults={
light:{w:.8,h:.8,intensity:80,kelvin:5600,color:'5600K',beamAngle:45},
softbox:{w:1.2,h:.8,intensity:75,kelvin:5600,color:'5600K',beamAngle:90},
practical:{w:.7,h:.7,intensity:60,kelvin:3200,color:'3200K',beamAngle:120},
camera:{w:1,h:.7,intensity:100,kelvin:5600,color:'N/A',beamAngle:45,lens:35,aperture:'f/2.8',whiteBalance:5600},
subject:{w:.8,h:.8,intensity:100,kelvin:0,color:'N/A',beamAngle:45},
monitor:{w:1.1,h:.7,intensity:100,kelvin:0,color:'N/A',beamAngle:45},
wall:{w:2,h:.25,intensity:100,kelvin:0,color:'N/A',beamAngle:45},
greenscreen:{w:3,h:.25,intensity:100,kelvin:0,color:'Chroma Green',beamAngle:45}
};
const state={layout:{name:'Studio Planner V2.1 Layout',width:12,height:8,gridSize:1,snap:true,notes:'',gridVisible:true},objects:[],measurements:[],selectedId:null,dragId:null,dragOffset:{x:0,y:0},measure:false,pending:null};
const floor=document.getElementById('floor'),stage=document.getElementById('stage'),list=document.getElementById('objectList'),floorLabel=document.getElementById('floorLabel');
const E=id=>document.getElementById(id);
const inp={layoutName:E('layoutName'),floorWidth:E('floorWidth'),floorHeight:E('floorHeight'),gridSize:E('gridSize'),snapToggle:E('snapToggle'),layoutNotes:E('layoutNotes'),empty:E('detailEmpty'),panel:E('detailPanel'),dName:E('dName'),dType:E('dType'),dPreset:E('dPreset'),dX:E('dX'),dY:E('dY'),dW:E('dW'),dH:E('dH'),dRot:E('dRot'),dRotV:E('dRotV'),dBeam:E('dBeam'),dBeamV:E('dBeamV'),dIntensity:E('dIntensity'),dIntensityV:E('dIntensityV'),dKelvin:E('dKelvin'),dLens:E('dLens'),dAperture:E('dAperture'),dWB:E('dWB'),dColor:E('dColor'),dNotes:E('dNotes'),loadFile:E('loadFile'),beamBox:E('beamBox'),intensityBox:E('intensityBox'),kelvinBox:E('kelvinBox'),lensBox:E('lensBox'),apertureBox:E('apertureBox'),wbBox:E('wbBox')};
function id(){return Math.random().toString(36).slice(2,10)}function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function ppm(){return Math.min((stage.clientWidth-80)/state.layout.width,(stage.clientHeight-80)/state.layout.height)}
function px(m){return m*ppm()}function mt(p){return p/ppm()}function snap(v){if(!state.layout.snap)return v;let s=Math.max(.1,+state.layout.gridSize||1);return Math.round(v/s)*s}
function obj(id){return state.objects.find(o=>o.id===id)||null}function sel(){return obj(state.selectedId)}
function hasBeam(t){return ['light','softbox','practical'].includes(t)}function isCam(t){return t==='camera'}function short(t){return{light:'L',softbox:'SB',practical:'P',camera:'C',subject:'S',monitor:'M',wall:'W',greenscreen:'GS'}[t]||'?'}
function meta(o){if(hasBeam(o.type))return `${o.intensity}% · ${o.kelvin||o.color}K`; if(o.type==='camera')return `${o.lens||35}mm · ${o.aperture||'f/2.8'} · WB ${o.whiteBalance||5600}K`; return ''}
function addObject(type){let p=defaults[type],n=state.objects.filter(o=>o.type===type).length+1;let o={id:id(),type,name:type[0].toUpperCase()+type.slice(1)+' '+n,x:state.layout.width/2,y:state.layout.height/2,w:p.w,h:p.h,rotation:0,intensity:p.intensity,kelvin:p.kelvin,color:p.color,beamAngle:p.beamAngle,lens:p.lens||35,aperture:p.aperture||'f/2.8',whiteBalance:p.whiteBalance||5600,notes:'',presetName:''};state.objects.push(o);state.selectedId=o.id;render()}
function addPreset(k){let p=presets[k],n=state.objects.filter(o=>o.presetName===p.name).length+1;let o={id:id(),type:p.type,name:p.name+' '+n,x:state.layout.width/2,y:state.layout.height/2,w:p.w,h:p.h,rotation:0,intensity:p.intensity,kelvin:p.kelvin,color:p.color,beamAngle:p.beamAngle,lens:35,aperture:'f/2.8',whiteBalance:5600,notes:'',presetName:p.name};state.objects.push(o);state.selectedId=o.id;render()}
function duplicateSelected(){let s=sel();if(!s)return;let c={...s,id:id(),name:s.name+' Copy',x:clamp(s.x+.5,0,state.layout.width),y:clamp(s.y+.5,0,state.layout.height)};state.objects.push(c);state.selectedId=c.id;render()}
function deleteSelected(){if(!state.selectedId)return;let sid=state.selectedId;state.objects=state.objects.filter(o=>o.id!==sid);state.measurements=state.measurements.filter(m=>m.a!==sid&&m.b!==sid);state.selectedId=state.objects[0]?.id||null;render()}
function centerSelected(){let s=sel();if(s){s.x=state.layout.width/2;s.y=state.layout.height/2;render()}}
function toggleGrid(){state.layout.gridVisible=!state.layout.gridVisible;render()}function toggleMeasure(){state.measure=!state.measure;state.pending=null;render()}function clearMeasurements(){state.measurements=[];state.pending=null;render()}
function renderFloor(){let p=ppm();floor.style.width=state.layout.width*p+'px';floor.style.height=state.layout.height*p+'px';floor.classList.toggle('grid',state.layout.gridVisible);floor.style.backgroundSize=state.layout.gridSize*p+'px '+state.layout.gridSize*p+'px';floorLabel.textContent=`${state.layout.name} · ${state.layout.width}m × ${state.layout.height}m`;E('measureBtn').textContent='Measure: '+(state.measure?'On':'Off');E('measureStatus').textContent=!state.measure?'Click two objects':state.pending?'Select second object':'Select first object'}
function beam(o){let b=document.createElement('div');b.className='beam';let L=Math.max(45,Math.min(140,o.intensity*1.2)),hw=Math.tan(((+o.beamAngle||45)/2)*Math.PI/180)*L;b.innerHTML=`<svg width="${Math.ceil(hw*2)+4}" height="${Math.ceil(L)+4}" viewBox="0 0 ${Math.ceil(hw*2)+4} ${Math.ceil(L)+4}"><polygon points="${hw+2},2 2,${L+2} ${hw*2+2},${L+2}" fill="rgba(250,204,21,.22)"/></svg>`;return b}
function markup(o){let d=document.createElement('div');d.className=`obj ${o.type} ${o.id===state.selectedId?'selected':''}`;let w=Math.max(20,px(o.w)),h=Math.max(12,px(o.h));d.style.width=w+'px';d.style.height=h+'px';d.style.left=px(o.x)-w/2+'px';d.style.top=px(o.y)-h/2+'px';d.style.transform=`rotate(${o.rotation}deg)`;
let c=document.createElement('div');c.className='core';c.textContent=short(o.type);d.appendChild(c);if(hasBeam(o.type))d.appendChild(beam(o));if(o.type==='camera'){let x=document.createElement('div');x.className='camdir';d.appendChild(x)}if(o.type==='subject'){let x=document.createElement('div');x.className='subdir';d.appendChild(x)}
let n=document.createElement('div');n.className='name-label';n.textContent=o.name;d.appendChild(n);let m=meta(o);if(m){let ml=document.createElement('div');ml.className='meta-label';ml.textContent=m;d.appendChild(ml)}
d.onpointerdown=e=>startDrag(e,o.id);d.onclick=e=>{e.stopPropagation();clickObj(o.id)};return d}
function clickObj(oid){state.selectedId=oid;if(state.measure){if(!state.pending)state.pending=oid;else if(state.pending!==oid){if(!state.measurements.some(m=>(m.a===state.pending&&m.b===oid)||(m.a===oid&&m.b===state.pending)))state.measurements.push({id:id(),a:state.pending,b:oid});state.pending=null}}render()}
function renderMeasures(){state.measurements.forEach(m=>{let a=obj(m.a),b=obj(m.b);if(!a||!b)return;let x1=px(a.x),y1=px(a.y),x2=px(b.x),y2=px(b.y),dx=x2-x1,dy=y2-y1,L=Math.hypot(dx,dy),ang=Math.atan2(dy,dx)*180/Math.PI,dist=Math.hypot(b.x-a.x,b.y-a.y);let l=document.createElement('div');l.className='measure-line';l.style.left=x1+'px';l.style.top=y1+'px';l.style.width=L+'px';l.style.transform=`rotate(${ang}deg)`;floor.appendChild(l);let lab=document.createElement('div');lab.className='measure-label';lab.style.left=(x1+x2)/2+'px';lab.style.top=(y1+y2)/2-8+'px';lab.textContent=dist.toFixed(2)+' m';floor.appendChild(lab)})}
function renderObjects(){floor.querySelectorAll('.obj,.measure-line,.measure-label').forEach(n=>n.remove());renderMeasures();state.objects.forEach(o=>floor.appendChild(markup(o)))}
function renderList(){list.innerHTML='';state.objects.forEach(o=>{let b=document.createElement('button');b.className='item '+(o.id===state.selectedId?'active':'');b.innerHTML=`<strong>${o.name}</strong><div class="mini">${o.type} · ${o.x.toFixed(1)}m, ${o.y.toFixed(1)}m<br>${meta(o)}</div>`;b.onclick=()=>{state.selectedId=o.id;render()};list.appendChild(b)})}
function renderDetails(){let s=sel();if(!s){inp.empty.style.display='block';inp.panel.style.display='none';return}inp.empty.style.display='none';inp.panel.style.display='block';inp.dName.value=s.name;inp.dType.value=s.type;inp.dPreset.value=s.presetName||'Custom';inp.dX.value=s.x.toFixed(1);inp.dY.value=s.y.toFixed(1);inp.dW.value=s.w.toFixed(1);inp.dH.value=s.h.toFixed(1);inp.dRot.value=s.rotation;inp.dRotV.textContent=s.rotation;inp.dBeam.value=s.beamAngle||45;inp.dBeamV.textContent=s.beamAngle||45;inp.dIntensity.value=s.intensity;inp.dIntensityV.textContent=s.intensity;inp.dKelvin.value=s.kelvin||5600;inp.dLens.value=s.lens||35;inp.dAperture.value=s.aperture||'f/2.8';inp.dWB.value=s.whiteBalance||5600;inp.dColor.value=s.color;inp.dNotes.value=s.notes;let hb=hasBeam(s.type),cam=isCam(s.type);inp.beamBox.style.display=hb?'block':'none';inp.intensityBox.style.display=hb?'block':'none';inp.kelvinBox.style.display=hb?'block':'none';inp.lensBox.style.display=cam?'block':'none';inp.apertureBox.style.display=cam?'block':'none';inp.wbBox.style.display=cam?'block':'none'}
function constrain(){state.objects.forEach(o=>{o.x=clamp(o.x,0,state.layout.width);o.y=clamp(o.y,0,state.layout.height)})}
function startDrag(e,oid){if(state.measure)return;e.stopPropagation();let o=obj(oid);if(!o)return;state.selectedId=oid;state.dragId=oid;let r=floor.getBoundingClientRect();state.dragOffset.x=e.clientX-r.left-px(o.x);state.dragOffset.y=e.clientY-r.top-px(o.y);render()}
window.onpointermove=e=>{if(!state.dragId)return;let o=sel();if(!o)return;let r=floor.getBoundingClientRect();o.x=clamp(snap(mt(e.clientX-r.left-state.dragOffset.x)),0,state.layout.width);o.y=clamp(snap(mt(e.clientY-r.top-state.dragOffset.y)),0,state.layout.height);render()};window.onpointerup=()=>state.dragId=null;window.onresize=render;
floor.onclick=e=>{if(e.target===floor){state.selectedId=null;state.pending=null;render()}};
function bind(){inp.layoutName.oninput=()=>{state.layout.name=inp.layoutName.value;render()};inp.floorWidth.oninput=()=>{state.layout.width=Math.max(1,+inp.floorWidth.value||1);constrain();render()};inp.floorHeight.oninput=()=>{state.layout.height=Math.max(1,+inp.floorHeight.value||1);constrain();render()};inp.gridSize.oninput=()=>{state.layout.gridSize=Math.max(.1,+inp.gridSize.value||1);render()};inp.snapToggle.onchange=()=>state.layout.snap=inp.snapToggle.value==='on';inp.layoutNotes.oninput=()=>state.layout.notes=inp.layoutNotes.value;
const apply=()=>{let s=sel();if(!s)return;s.name=inp.dName.value;s.x=clamp(+inp.dX.value||0,0,state.layout.width);s.y=clamp(+inp.dY.value||0,0,state.layout.height);s.w=Math.max(.1,+inp.dW.value||.1);s.h=Math.max(.1,+inp.dH.value||.1);s.rotation=+inp.dRot.value||0;s.beamAngle=+inp.dBeam.value||45;s.intensity=+inp.dIntensity.value||0;s.kelvin=+inp.dKelvin.value||5600;s.lens=+inp.dLens.value||35;s.aperture=inp.dAperture.value;s.whiteBalance=+inp.dWB.value||5600;s.color=inp.dColor.value;s.notes=inp.dNotes.value;render()};
['dName','dX','dY','dW','dH','dRot','dBeam','dIntensity','dKelvin','dLens','dAperture','dWB','dColor','dNotes'].forEach(k=>inp[k].oninput=apply)}
function saveLayout(){let blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),u=URL.createObjectURL(blob),a=document.createElement('a');a.href=u;a.download=(state.layout.name||'studio_layout').replace(/\s+/g,'_').toLowerCase()+'.json';a.click();URL.revokeObjectURL(u)}
inp.loadFile.onchange=async e=>{let f=e.target.files[0];if(!f)return;try{let p=JSON.parse(await f.text());state.layout={...state.layout,...p.layout};state.objects=p.objects||[];state.measurements=p.measurements||[];state.selectedId=p.selectedId||state.objects[0]?.id||null;inp.layoutName.value=state.layout.name;inp.floorWidth.value=state.layout.width;inp.floorHeight.value=state.layout.height;inp.gridSize.value=state.layout.gridSize;inp.snapToggle.value=state.layout.snap?'on':'off';inp.layoutNotes.value=state.layout.notes||'';render()}catch(err){alert('Could not load layout JSON.')}e.target.value=''}
